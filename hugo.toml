baseURL = "https://hgbk.mll.cc.cd/"
theme = "hugo-primer-blog"
title = "M.Liu"

defaultContentLanguage = "zh"
defaultContentLanguageInSubdir = false

enableGitInfo = false
enableRobotsTXT = true

[outputs]
home = ["HTML", "RSS", "LLMS", "JSON"]
page = ["HTML", "Markdown"]
section = ["HTML", "RSS"]
taxonomy = ["HTML"]
term = ["HTML", "RSS"]
[mediaTypes]
  [mediaTypes."application/json"]
    suffixes = ["json"]

[outputFormats]
  [outputFormats.JSON]
    mediaType = "application/json"
    baseName = "index"       # 确保生成的文件名叫 index.json
    isPlainText = true       # 告诉 Hugo 这是纯文本模板，需要解析里面的 {{ ... }}


[languages]
  [languages.zh]
    contentDir = "content"
    label = "中文简体"
    weight = 1
    # 👇 關鍵核心：強迫中文語系生成自己的分類頁面
    [languages.zh.taxonomies]
      category = "categories"
      tag = "tags"
    [languages.zh.params]
      description = "一个由 Hugo 和 Primer CSS 驱动的博客"
    
    # 這裡的網址我們直接用最純粹的中文，配合上面新加的設定，絕對能對準！
[[languages.zh.menus.main]]
      name = "首页"
      url = "/"
      weight = 1

    [[languages.zh.menus.main]]
      name = "网络收藏"
      url = "/categories/网络收藏/"  # 👈 有了上面的實體資料夾，直接這樣寫絕不會錯
      weight = 2

    [[languages.zh.menus.main]]
      name = "琐事"
      url = "/categories/琐事/"
      weight = 3

[params]
author = "M.Liu" 
dateFormat = "2006-01-02" 
defaultTheme = "auto" 
description = "A blog powered by Hugo and Primer CSS" 
ogImage = "https://picsum.photos/seed/ogimage/1200/630" 
primaryColor = "#f67717ff" # Purple (GitHub style)
recentPostsCount = 5 
showAuthor = true 
showReadingTime = true 
showShareButtons = true 
sidebar = true 
twitterSite = "yzgetr" 
faviconIco = "/images/favicon.ico"
comments = true
# Sidebar modules (loaded from layouts/partials/sidebar/*.html)
# Order determines display order
[[params.sidebarModules]]
partial = "aboutme"

[[params.sidebarModules]]
partial = "social"

[[params.sidebarModules]]
partial = "recentPosts"

[[params.sidebarModules]]
partial = "tags"

[[params.sidebarModules]]
partial = "categories"

[[params.sidebarModules]]
partial = "archive"

[[params.sidebarModules]]
partial = "links"

[params.social]
bluesky = "hudiefei.bsky.social"
github = "yzget"
x = "yzgetr"
[params.page.code]
  # 开启代码块复制按钮
  copy = true 


[menus]
[[menus.main]]
name = "RSS"
url = "https://hgbk.mll.cc.cd/zh/index.xml" # 对应 home 的 RSS 路径   
 weight = 1

#[[menu.main]]
  #name = "🔍 搜索"  # 直接在这里加一个 Emoji 放大镜，非常直观
 # url = "/search/"
 # weight = 2       # 数字越小越靠前，你可以把它排在第一位或者最后一位

[[menus.footer]]
name = "Privacy"
url = "/privacy/"
weight = 1

[[menus.footer]]
name = "Terms"
url = "/terms/"
weight = 2

[taxonomies]
archive = "archives"
category = "categories"
tag = "tags"

[markup]
[markup.highlight]
anchorLineNos = false
codeFences = true
guessSyntax = true
hl_Lines = ""
hl_inline = false
lineAnchors = ""
lineNoStart = 1
lineNos = false
lineNumbersInTable = true
noClasses = false
noHl = false
style = "github"
tabWidth = 4

[sitemap]
changefreq = "weekly"
filename = "sitemap.xml"
priority = 0.5

[frontmatter]
date = ["date", "publishDate", "lastmod"]
lastmod = ["lastmod", ":git", "date", "publishDate"]

[pagination]
pagerSize = 10
